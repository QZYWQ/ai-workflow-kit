# Platform Operation — 路径 C
spec:
  name: platform-operation
  version: "2.1"
  extends: task-router
  path: C
  triggers: ["提交", "同步", "标记", "API", "批量", "batch", "PATCH", "/check", "挖掘", "升阶", "upgrade", "favorite", "星标", "账户", "submit", "simulate"]

states:
  plan:
    tools_from_library:
      - langgraph-cli-run      # trigger: 批量API(api-batch.yaml)
    rules:
      - "声明 API 端点 + 方法 + 限流"
      - "可逆优先: GET→PATCH→POST"
      - "不可逆操作(submit/delete)标 [H]"
    output: "API 操作计划:\n1. [H/M/L] METHOD endpoint — 目的\n..."

  execute:
    rules:
      - "每步: 检查 status code, 记录结果"
      - "限流: 等待 retry-after"
      - "错误: 暂停+汇报"
      - "产出: runs/ 对应目录"

  verify:
    tools_from_library:
      - verify                 # evidence-based completion
    checks:
      - "所有操作结果已记录"
      - "提交: /check 8-PASS 通过"
      - "账户状态已同步"

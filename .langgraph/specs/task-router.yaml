spec:
  name: task-router
  version: '2.6'
  entry: assess
  notes: 'v2.6: +bdd(acceptance/evaluate/reconcile) +ddd(tenets/model) — BDD/DDD methodology
    integration

    v2.5: +intelligent-takeover(四维感知+takeover_card+hot/warm/cold恢复)

    v2.4: +error_levels(exp/rate/sys) +skill_composition +multi_step_flow

    '
context_assessment:
  modes:
    greenfield:
      detect: '!CONTEXT.md && !docs/adr/ && 项目文件 < 10'
      behavior: 'grill-with-docs 强制触发(建立术语表). 路径 D: 先 create CONTEXT.md'
    brownfield_docs:
      detect: CONTEXT.md || docs/adr/
      behavior: 'grill-with-docs 检查对齐. 所有路径: 先读 CONTEXT.md 再 plan'
    brownfield_nodocs:
      detect: 项目文件 ≥ 10 && !CONTEXT.md && !docs/adr/
      behavior: 从代码推断术语. grill-with-docs 可选(无文档可对齐). gitnexus-context 加强
    midstream:
      detect: handoff 文件存在 || OMEGA 有活跃会话记录
      behavior: 先恢复 handoff/OMEGA 状态. 在恢复的上下文上继续. 不重新 classify 已完成的部分
      override: '用户明确放弃续接时降级。

        触发词: "不管上次"|"新任务"|"先不管"|"另起"|"从头"|"新话题"|"换个任务"|"ignore previous"

        降级为基于当前项目文件状态的模式(CONTEXT.md→brownfield_docs, 否则→brownfield_nodocs/greenfield)

        '
      mode_refresh: '同一会话每个新任务前快速 re-check(仅 ls, ≤1秒):

        - 上次 assess 后建了 CONTEXT.md? → greenfield→brownfield_docs

        - 上次 assess 后写了 ADR? → brownfield_nodocs→brownfield_docs

        如果模式变化 → 更新模式, 新任务按新模式行为执行

        '
      task_switch_detection: '当前在 execute/verify 中, 用户请求不匹配当前步骤:

        → 暂停, "检测到任务切换。当前[路径X|状态Y]未完成。新任务重新 assess+classify?"

        → 用户确认后 → 返回 assess, 已完成的步骤保留在上下文

        '
  mode_gated_activation:
    greenfield:
      rationale: 空白项目没有实体、没有模块、没有 spec——但最需要这些。忽略 trigger 中的数量门槛。
      force_active:
      - grill-with-docs
      - ddd-tenets
      - bdd-acceptance
      - ddd-model
      protocol: '设计优先于实现。在 greenfield 模式下，plan 状态必须先完成设计闭环：

        grill-with-docs(术语收敛) → ddd-tenets(领域建模) → ddd-model(持久化模型) → bdd-acceptance(行为spec)

        三者 exit 条件全部满足后，才进入 implement。

        这不是可选的——空白项目没有代码可以"理解"，必须从设计开始。

        '
    brownfield_nodocs:
      rationale: 有代码无文档——必须从代码反向提取领域模型。grill-with-docs 从可选升级为强制。
      force_active:
      - grill-with-docs
      - ddd-tenets
      protocol: 'langgraph-cli-analyze 先跑(全局理解) → grill-with-docs 建立术语表

        → ddd-tenets 从代码推断领域模型。三者结束后进入 implement。

        '
    brownfield_docs:
      rationale: 已有文档——检查对齐即可。无强制升级。
      force_active: []
    midstream:
      rationale: 恢复会话——不重新触发设计工具。
      force_active: []
  conflict_resolution:
    mode_gate_vs_methodology: mode_gate 优先。项目模式比开发阶段更具体。
    scope_creep_vs_loop_cap: scope_creep 优先。当范围已变，在原范围内重试无意义——必须先回 plan 重新评估。
    ddd_on_pathE_vs_minimal_fix: path E 的 ddd-tenets 只读(分析已有领域结构定位根因)，不新建 Entity/重组边界。诊断工具，不是设计工具。
  sub_task_flow: '每阶段直接声明: "[→ 路径 X] 理由: ≤1行", 加载对应 spec 从起始状态开始。

    assess 不重跑（除非子任务改变了可检测的项目状态）。

    '
  skill_stack: '路径 spec: 何时做、工具分配、产出路由。

    领域 skill: 什么是正确的、hard rules、stop conditions。

    冲突: 领域 hard rule 优先于执行流程的"继续"。

    '
tool_library:
  grill-with-docs:
    skill: grill-with-docs
    provides:
    - 需求对齐
    - 术语收敛
    - CONTEXT.md/ADR 更新
    trigger:
      must: CONTEXT.md 或 docs/adr/ 存在 | 跨文件修改(≥3) | 用户术语模糊/过载 | 新概念/新数据流
      skip: 单文件修改 AND 指令精确 AND 无文档冲突可能
    protocol: 逐题追问, 每次一个, 等待反馈, 提供推荐答案。优先探索代码库回答。不批处理。
    exit: 所有分支解决 AND 术语收敛 AND 设计决策已记录
    deconflict:
      vs_ddd_tenets: grill-with-docs 收敛术语(叫什么), ddd-tenets 约束结构(是什么类型)。互补
    methodology: core
    modes:
      with_docs: 默认模式——检查 CONTEXT.md/ADR, 写文档
      no_docs: 'grill-me 模式——纯策略 stress-test, 不检查文档, 不写文档。触发: 用户说 grill me 或 stress
        test'
  diagnose:
    skill: diagnose
    provides:
    - 诊断闭环: 重现→定位→修复→回归
    trigger:
      must: 用户报 bug/error/异常 | 2次以上 fix 尝试失败 | 性能突然退化
    protocol: 'Phase 1: 建立反馈循环（最快最重要——测试/脚本/确定性复现信号）

      Phase 2: 二分法缩小范围

      Phase 3: 假设验证（用证据, 不猜测）

      Phase 4: 最小修复（不趁机重构）

      Phase 5: 回归验证（确认修了+没引入新问题）+ 追加测试防复发

      '
    exit: bug 不再复现 AND 回归测试通过 AND 根因已定位
    methodology: core
  tdd:
    skill: tdd
    provides:
    - test-first workflow
    - red-green-refactor
    trigger:
      must: 新功能实现 | 非琐碎 bugfix | 用户说 'tdd'/'test first'
      skip: 纯配置修改 | 文档更新 | 已有完整测试覆盖的一行修复
    protocol: '每步骤: 写测试→验证失败→最小实现→测试通过→重构(仅当前步骤范围)

      禁止: 跳过测试写实现 | 一次多步 | 横切(所有测试→所有代码) | 实现不需要的抽象

      '
    exit: 所有步骤测试通过 AND gitnexus detect_changes 确认范围
    methodology: tdd
  worldquant-brain-alpha-engineering:
    skill: worldquant-brain-alpha-engineering
    provides:
    - 硬规则
    - submission gate
    - field 判断
    - sign-flip protocol
    trigger:
      must: 项目检测为 alpha-research AND 任务涉及 alpha 设计/挖掘/提交/诊断
      skip: 纯读文件/解释代码/账户状态查询
    methodology: core
  prototype:
    skill: prototype
    provides:
    - throwaway validation: LOGIC 终端测试 or UI 多方案对比
    trigger:
      must: 设计不确定的数据模型/状态机 ('这个逻辑对吗?') | 需要比较多个 UI 方案
    protocol: 'LOGIC 分支: tiny CLI app 推动状态机通过难推理的 case。UI 分支: 多套激进不同方案, URL param
      切换。'
    exit: 问题已回答 → 扔掉原型, 保留结论
    methodology: core
  verify:
    skill: verify
    provides:
    - evidence-based completion verification
    trigger:
      must: 路径 D 编码完成 | 提交 PR 前 | 用户说 'verify'/'验证'
    protocol: 运行测试→检查产出→对比计划→确认无遗漏。不是自己说 'done'——要有证据。
    exit: 测试 PASS AND 产出匹配计划 AND 无未提交变更破坏性副作用
    deconflict:
      vs_bdd_evaluate: verify 验证'测试通过+产出匹配', bdd-evaluate 验证'行为符合 spec'。互补
    methodology: core
  handoff:
    skill: handoff
    provides:
    - 会话压缩传递
    trigger:
      must: 任务未完成但上下文将满 | 用户说'下次继续'/'handoff' | 多会话追踪
    protocol: 压缩当前会话状态+未完成任务+关键决策 → handoff 文档。agent 读入即可继续。
    methodology: core
  to-prd:
    skill: to-prd
    provides:
    - PRD 生成→发布到 issue tracker
    trigger:
      must: 用户说 'create PRD' / '生成 PRD' | 设计完成后需要正式文档化
    methodology: core
  to-issues:
    skill: to-issues
    provides:
    - 方案→独立可 grab 的 issues
    trigger:
      must: 用户说 'break into issues'/'拆成 issues' | plan 完成后需要分配任务
    protocol: 用 tracer-bullet 竖切——每个 issue 一个完整 vertical slice。
    methodology: core
  caveman:
    skill: caveman
    provides:
    - 超高压缩模式
    - 节省 ~75% token
    trigger:
      must: 用户说 'caveman'/'少说话'/'简短点' | 上下文空间紧张
    methodology: core
  langgraph-cli-analyze:
    cli: langgraph-cli analyze .
    provides:
    - 项目结构全局分析
    trigger:
      must: '路径 B: 运维扫描 | 路径 F: 设计前理解现状 | 陌生项目首次'
    methodology: core
  langgraph-cli-review:
    cli: langgraph-cli review <file>
    provides:
    - 并行安全+质量审查
    trigger:
      must: '路径 D: 编码完成后立即 | 提交前 final check'
    methodology: core
  langgraph-cli-pr:
    cli: langgraph-cli pr
    provides:
    - PR 描述生成
    trigger:
      must: 编码完成后, 准备提交 PR 前
    methodology: core
  langgraph-cli-run:
    cli: langgraph-cli run <workflow.yaml>
    provides:
    - YAML 多 agent 并行工作流
    trigger:
      must: 批量 API 操作(api-batch.yaml) | 批量代码审查(code-review.yaml)
      skip: 单次 API 调用 | <4 个 alpha 操作
    methodology: core
  gitnexus-context:
    cli: gitnexus context <symbol>
    provides:
    - 符号完整上下文: 调用者+被调用者+所在 flow
    trigger:
      must: 修改/理解任何函数/类/符号前
    methodology: core
  gitnexus-impact:
    cli: gitnexus impact <symbol>
    provides:
    - blast radius: 直接调用者+受影响流程+风险等级
    trigger:
      must: 编辑任何函数/类/符号前——MUST NOT SKIP
    protocol: 如果返回 HIGH/CRITICAL → 暂停, 汇报影响范围, 等待用户确认
    methodology: core
  gitnexus-detect-changes:
    cli: gitnexus detect_changes
    provides:
    - 确认变更只影响预期符号
    trigger:
      must: '路径 D: 提交前 | 编码完成后的 verify 状态'
    protocol: 如果影响超预期 → 回 implement 修复
    methodology: core
  oh-my-claude-critic:
    agent: oh-my-claude:critic
    provides:
    - plan 审查(执行前)
    trigger:
      must: '路径 D/F: plan 完成后, implement 前 | 复杂计划 (>5 步骤)'
    protocol: Agent(subagent_type='oh-my-claude:critic', prompt='Review this plan...')
    output: APPROVED / NEEDS_REVISION / REJECTED
    methodology: core
  oh-my-claude-code-reviewer:
    agent: oh-my-claude:code-reviewer
    provides:
    - 实现后全面代码审查(PR diff 级)
    trigger:
      must: '路径 D: review 状态, 全部代码写完 merge 前'
    methodology: verify_full
  oh-my-claude-validator:
    agent: oh-my-claude:validator
    provides:
    - 技术正确性: 测试/lint/验证
    trigger:
      must: 编码完成后, 声明 done 前
    methodology: verify_full
  oh-my-claude-security-auditor:
    agent: oh-my-claude:security-auditor
    provides:
    - OWASP/注入/凭据/依赖CVE 深度审查
    trigger:
      must: 用户说 'security review' | 涉及认证/授权/加密/外部输入
    methodology: verify_full
  oh-my-claude-advisor:
    agent: oh-my-claude:advisor
    provides:
    - plan 前 gap 分析: 隐藏需求/范围风险
    trigger:
      must: 复杂任务(跨系统/跨模块) | 用户请求不完整(信息差 >30%)
    methodology: core
  oh-my-claude-risk-assessor:
    agent: oh-my-claude:risk-assessor
    provides:
    - 变更风险评估(功能性/安全/兼容/性能/运维)
    trigger:
      must: 非琐碎 plan 完成后, 执行前
    methodology: core
  omega-memory:
    provides:
    - 自动长期记忆
    trigger:
      auto: SessionStart hook 注入欢迎简报
      manual: omega_store(content, 'decision') — 完成任务后保存关键决策
    methodology: core
  bdd-acceptance:
    skill: bdd-acceptance
    provides:
    - 行为验收 spec 生成
    - Gherkin .feature 文件
    trigger:
      must: 路径 D plan 完成 | 路径 D 新功能涉及用户可见行为 | 路径 D 跨模块交互(≥2模块) | 路径 D implement 中变更范围扩大(scope
        creep)
      skip: 纯内部重构(无行为变更) | 配置修改 | 文档更新
    protocol: '从 plan 输出生成 Gherkin spec:

      Feature → Scenario → Given-When-Then

      每个 scenario 对应一个可验证的用户行为。

      禁止: 猜测行为 | 跳过 corner case | spec 与 plan 不一致

      '
    exit: .feature 文件存在 AND 覆盖所有 plan 中声明的行为 AND 术语与 grill-with-docs 收敛结果一致
    methodology: bdd
  bdd-evaluate:
    skill: bdd-evaluate
    provides:
    - 行为验证
    - Gherkin spec 对照
    - 行为覆盖检查
    trigger:
      must: bdd-acceptance 生成了 .feature 文件 | 路径 D review 状态
      skip: 无 .feature 文件的项目
    protocol: '对照 .feature 文件逐条验证:

      每个 Scenario 的 Given-When-Then 是否都被实现覆盖?

      行为是否与 spec 一致（不是"看起来差不多"）?

      失败 → 标注未覆盖的 scenario, 回 implement

      '
    exit: 所有 scenario PASS AND 无遗漏行为
    methodology: bdd
  bdd-reconcile:
    skill: bdd-reconcile
    provides:
    - 需求变更级联
    - spec 一致性维护
    trigger:
      must: 用户说'需求变了'/'改成' | 路径 D plan 阶段发现与已有 spec 冲突 | 路径 D implement 中行为与 spec
        偏离
    protocol: '需求变更 → 追溯到最早受影响的 spec → 级联更新。

      从变更点开始, 向下游传播:

      spec → plan → task → code → test。

      每层标注 [RECONCILE] 变更范围。

      禁止: 直接改代码跳过 spec 更新 | 只改 spec 不追溯下游

      '
    exit: 变更链完整 AND 所有受影响层已更新 AND 无断裂引用
    methodology: bdd
  ddd-tenets:
    cli: npx tenets check
    provides:
    - DDD 架构约束
    - 聚合/实体/值对象规则
    - 限界上下文边界
    trigger:
      must: 路径 F 设计阶段 | 路径 D 涉及新领域概念(≥3个新实体) | brownfield 项目首次建立领域模型 | 路径 E bug 涉及领域概念
      skip: 纯 CRUD | 无新领域概念的单文件修改
    protocol: '作为静态约束层加载, 不主动执行:

      1. takeover rules 层自动加载 tenets 规则文件

      2. plan 状态(路径 D/F): 设计产出必须标注 Aggregate Root / Entity / Value Object 分类

      3. implement 状态(路径 D): 新建类/结构体时自检——这是 Entity 还是 VO? 是否跨了 Bounded Context?

      4. 路径 E(bugfix): 只读模式——分析已有领域结构定位 bug 根因。禁止建议新建 Entity 或重组 Bounded Context。

      5. 违反 DDD 规则 → [DDD VIOLATION] marker, 暂停并建议修正

      '
    exit: 设计产出有明确的领域分类 AND 无 DDD VIOLATION
    deconflict:
      vs_grill_with_docs: grill-with-docs 负责术语(叫什么), ddd-tenets 负责结构(是什么类型, 属于哪个边界)
      vs_bdd_acceptance: ddd-tenets 先(领域分类), bdd-acceptance 后(行为spec)。bdd 依赖 ddd 的
        Aggregate 边界来组织 scenario
      vs_tdd: ddd-tenets 负责类型分类(每实体一次), tdd 负责行为验证(每步骤一次)。不冲突——分类先于验证
      vs_diagnose: path E 的 ddd-tenets 是只读诊断工具——分析领域结构定位根因。不新建 Entity/不重组边界。不违反 diagnose
        的'最小修复'原则。
    methodology: ddd
  ddd-model:
    cli: langgraph-cli model
    provides:
    - 领域模型持久化
    - .langgraph/model.md 演进
    trigger:
      must: 路径 F design 完成 | 新领域概念引入 | grill-with-docs 更新了 CONTEXT.md 术语 | 路径 D implement
        中引入 ≥1 新 Entity
      skip: 无新领域概念 | 纯运维/诊断路径
    protocol: '维护 .langgraph/model.md 作为活的领域模型:

      - Bounded Context 列表 + 各自职责

      - Aggregate Root → Entity → Value Object 关系

      - 跨 Context 集成关系(Partnership/Shared Kernel/Customer-Supplier/Conformist)

      每次 design 完成后增量更新, 不重写。

      '
    exit: model.md 已更新 AND 与 CONTEXT.md 术语一致 AND 与 ADR 决策一致
    methodology: ddd
states:
  assess:
    order: 0
    on_enter: '先运行智能接管协议（`intelligent-takeover.yaml`），输出 Takeover Card。

      然后评估项目模式。此状态仅允许: 读文件/检查目录。

      **禁止: Bash/Write/Edit/编码/API。此状态不是执行，是感知。**

      **v2.5: 接管优先——hot recovery 会跳过后续 assess+classify，直接恢复任务。**

      '
    takeover_first: "执行 intelligent-takeover.yaml 的五层感知（state → context → health →\
      \ rules → phase）。\n输出 Takeover Card 后，根据 recovery 级别路由:\n  hot  → 注入 Takeover\
      \ Card，跳过 assess+classify，直接恢复任务栈\n  warm → 从 handoff/OMEGA 重建上下文，然后进入 classify\n\
      \  cold → 进入标准 assess 流程（下方 checks）\n"
    refresh_trigger:
    - 每个新用户请求开始时（在 classify 前）
    - 当前状态为 execute/verify 但用户请求不匹配 → task_switch_detection 触发 → 返回 assess
    - 上次 assess 后创建/修改了 CONTEXT.md 或 ADR → 模式可能已变
    checks:
    - CONTEXT.md 存在? → brownfield_docs
    - docs/adr/ 有文件? → brownfield_docs
    - 项目文件数 ≥ 10 且无文档? → brownfield_nodocs
    - 项目文件数 < 10 且无文档? → greenfield
    - handoff 文件存在? OMEGA 有活跃上下文? → midstream
    mode_detection: "检测方式:\n  1. `ls CONTEXT.md docs/adr/` → 存在即 brownfield_docs\n\
      \  2. `find . -type f -not -path '*/.git/*' | wc -l` → <10 = greenfield\n  3.\
      \ `ls runs/session-briefs/ .langgraph/handoff*` → 存在 = midstream\n  4. OMEGA\
      \ welcome 中包含 \"上次会话\" 关键信息 → midstream\n"
    mode_behavior:
      greenfield: '没有文档, 没有代码, 从零开始。

        - 所有路径: plan 状态 MUST 先建立 CONTEXT.md（术语表）

        - grill-with-docs: 强制触发, 建立初始术语体系

        - 路径 D: implement 前先有术语表——避免设计和代码术语分裂

        '
      brownfield_docs: '有 CONTEXT.md 或 ADR——已建立术语+决策记录。

        - 所有路径: plan 状态 MUST 先读 CONTEXT.md

        - grill-with-docs: 检查新设计与已有术语/决策的一致性

        - 如果发现术语冲突: "你的 CONTEXT.md 定义 X 为 A, 但你似乎在用 X 指 B"

        '
      brownfield_nodocs: '有代码但没有文档。

        - langgraph-cli-analyze: MUST 先跑(从代码结构推断领域模型)

        - grill-with-docs: 可选(无文档可对齐, 但可建立初始 CONTEXT.md)

        - 路径 D: gitnexus-context 加强(代码是唯一真理来源)

        '
      midstream: '上一次会话未完成, 通过 handoff 或 OMEGA 续接。

        - 先读 handoff 文件/OMEGA 上下文, 恢复未完成任务列表

        - classify 基于续接的任务状态, 不是用户当前请求

        - 已完成的门 [classify ✓] 不需重复

        '
    methodology_eval: "接管完成后, 根据 intelligent-takeover 的 phase 检测结果,\n加载 methodology-activation.yaml,\
      \ 生成 Methodology Card:\n1. 查 phases.{phase}.default_activation → 设定初始激活级别\n\
      2. 查 complexity_signals → 是否触发建议升级\n3. 输出 Methodology Card (注入后续所有状态的上下文)\n\
      4. 用户可通过 \"激活/关闭/简化 + 方法论名\" 随时切换\n5. 状态转换时: assess/classify 阶段所有方法论 off,\n\
      \   plan 阶段恢复方法论激活, done 阶段全部 off\n"
    output: '项目模式: [greenfield | brownfield_docs | brownfield_nodocs | midstream]

      开发阶段: [prototype | mvp | production | maintenance | unknown]

      方法学: TDD=active|passive|off BDD=active|passive|off DDD=active|passive|off

      证据: <CONTEXT.md 存在 / 文件数 N / handoff 存在 / OMEGA 有记录>

      '
    forbid:
    - Bash
    - Write
    - Edit
    - Agent
    - Python执行
    - API调用
    next: classify
  classify:
    order: 1
    on_enter: '项目模式: {{assess.mode}}。在此模式下分析用户请求关键词, 匹配路径。

      当前仅允许: 阅读/分析。

      midstream 模式: 优先从 handoff/OMEGA 恢复的任务上下文做分类, 不是用户当前请求字面。

      '
    patterns:
      C: 提交|同步|标记|API|批量|batch|PATCH|/check|挖掘|升阶|upgrade|favorite|星标|submit|simulate
      D: 实现|开发|新功能|重构|写代码|添加模块|加功能|修改代码|写库|脚本
      E: bug|报错|不工作|修复|调试|诊断|error|异常|性能
      F: 设计|架构|方案|规划|怎么实现|技术选型|选什么
      B: 审计|扫描|清理|安全审查|冗余|代码质量|依赖检查|项目健康
      A: null
    rules:
    - 'A: 不匹配任何模式 → 自由执行'
    - 'A 护栏: 若任务涉及 Write/Edit/Bash 写操作 → 禁止走 A。重新检查是否有匹配路径。A 仅限 Read/解释/问答(无副作用)。'
    - 'C-F: 匹配后立即停止当前动作, 输出分类, 加载 spec'
    output: '路径 [A/B/C/D/E/F] | 匹配: <关键词> | 理由: ≤1行'
    forbid:
    - Bash
    - Write
    - Edit
    - Agent
    - Python执行
    - API调用
    next: plan
    self_check: 我在执行前先分类了吗?
  plan:
    order: 2
    on_enter: 加载对应路径 spec, 查工具库触发条件, 输出步骤计划。可用的工具仅限于 Methodology Card 中 available_tools。
    tools:
    - grill-with-docs
    - worldquant-brain-alpha-engineering
    - gitnexus-context
    - langgraph-cli-analyze
    - oh-my-claude-advisor
    rules:
    - 每步 ≤1行 + 风险标记 [H/M/L]
    - '涉及 API: 声明限流'
    - '涉及文件创建: 声明路径'
    - '工具库中标记 ''MUST NOT SKIP'' 的: 禁止跳过'
    - 仅使用 Methodology Card 中 available_tools 列表内的工具。inactive_tools 中的工具视为不可用, 禁止调用。
    methodology_override: 用户可以随时说 '激活/关闭 + 方法论名' 来覆盖当前激活状态。本次任务有效。
    output: '步骤计划:

      1. [H/M/L] 步骤描述

      2. ...'
    forbid:
    - Write
    - Edit
    - API写操作
    - 提交操作
    next: execute
    self_check: 每个引用的工具都在 Methodology Card 的 available_tools 中吗?
    override:
      mechanism: 用户显式覆盖状态约束
      trigger: 用户说 "override" 或 "不管规则, 直接做" 或 "跳过这个检查"
      behavior: 记录覆盖原因, 然后允许执行被禁止的操作。不静默跳过。
      format: '[OVERRIDE] 状态: plan | 禁止: Write | 原因: 原型验证不需要完整设计 | 用户确认: yes'
      principle: 工作流是建议, 不是监狱。用户有权覆盖——但覆盖必须有记录, 不能沉默。
    methodology_filter:
      description: 按需注入：根据 Methodology Card 过滤可用工具。off 的工具不出现在上下文中。
      rule: plan 状态进入时，根据 Methodology Card 的激活级别过滤工具库：active/passive → 工具可用；off →
        工具从 available_tools 中移除，其 spec 文本视为不存在。
      core_always_available: methodology=core 的工具始终可用，不受方法论激活影响。
      effect: 减少上下文噪音。toolkit 项目 BDD=off → bdd-acceptance/evaluate/reconcile 的定义不注入。
  execute:
    order: 3
    on_enter: 逐步骤执行, 每步完成后标记 [✓]。遇错暂停。
    tools:
    - tdd
    - diagnose
    - langgraph-cli-review
    - gitnexus-impact
    - oh-my-claude-risk-assessor
    rules:
    - '每步完成: 输出 [✓ N/M | 结果]'
    - 'gitnexus impact: 编辑任何符号前 MUST 检查'
    - 错误 → 暂停+汇报, 不自动重试
    - 不可逆操作 → 暂停+请求确认
    - 覆盖 oh-my-claude 'just start working'
    output: '[✓ 1/M] [✓ 2/M] ... [✓ M/M]'
    forbid:
    - 跳过步骤
    - 合并步骤
    - 声称完成但缺[✓]
    next: verify
  verify:
    order: 4
    on_enter: 验证所有步骤完成, 检查产出。
    tools:
    - verify
    - gitnexus-detect-changes
    - oh-my-claude-validator
    - oh-my-claude-code-reviewer
    - oh-my-claude-security-auditor
    checks:
    - 所有步骤有 [✓]
    - 产出文件路径正确
    - 无凭据泄露
    - '路径 D: gitnexus detect_changes 确认范围'
    - '路径 D: langgraph-cli review 通过'
    output: '验证: N/N 完成 | 遗漏: 无 | 问题: 无'
    next: done
  done:
    order: 5
    on_enter: 任务完成。记录决策, 输出摘要。
    actions:
    - omega_store(content, 'decision') — 关键决策
    - langgraph-cli remember — 用户明确'记住这个'的
    - '输出: 变更文件 + 验证结果 + 后续建议'
    - 'audit: 对照每个已通过状态的 forbid 列表, 检查实际行为。记录违规(如有)。不阻止完成——仅记录供下次会话审视。'
    output: '## 完成摘要

      - 任务: ...

      - 产出: ...

      - 决策: ...'
    audit_check:
      description: 事后审计——不预防违规, 但记录违规以供回顾
      checks:
      - assess/classify 状态是否执行了 Bash/Write/Edit?
      - plan 状态是否执行了 Write/Edit?
      - preflight 是否执行了写操作?
      - 是否有路径 A 分类但实际执行了文件修改?
      output: 'audit: N 次 forbid 违规 | 原因: [用户明确 override | AI 未遵守 | 分类错误]'
      principle: 审计是追责机制, 不是预防机制。违规记录帮助发现 prompt 级约束的盲区。
error_levels:
  exp:
    desc: 已知会发生的失败
    behavior: 记录 → 跳过 → 继续 → [EXP] marker
  rate:
    desc: 临时限流——可恢复
    behavior: 等待 → 重试 ≤3 → 仍失败则 [RATE] 记录+跳过
  sys:
    desc: 意外错误——SSL / parse / auth
    behavior: 暂停 → 汇报 → [SYS] marker → 等用户

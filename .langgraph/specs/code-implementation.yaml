# Code Implementation — 路径 D
spec:
  name: code-implementation
  version: "2.2"
  extends: task-router
  path: D
  triggers: ["实现", "开发", "新功能", "重构", "写代码", "添加模块", "加功能", "修改代码", "写库"]

states:
  plan:
    on_enter: "理解需求→查已有实现→设计方案。禁止编码。"
    tools_from_library:
      - grill-with-docs        # trigger: CONTEXT.md or ≥3 files or fuzzy terms
      - gitnexus-context       # MUST: 理解任何符号前
      - langgraph-cli-analyze  # 陌生项目 or F 路径
      - oh-my-claude-advisor   # 复杂任务 gap 分析
      - bdd-acceptance         # trigger: plan 完成, 涉及用户可见行为 → 生成 .feature
      - ddd-tenets             # trigger: 新领域概念(≥3实体) → DDD 结构约束
      - ddd-model              # trigger: ddd-tenets 完成后 → 持久化领域模型
    rules:
      - "gitnexus-context: 修改任何函数/类前 MUST 查"
      - "grill-with-docs 的 exit 条件满足前 → 不进入 implement"
      - "工具执行顺序: grill-with-docs(术语收敛) → ddd-tenets(领域分类) → ddd-model(持久化模型) → bdd-acceptance(行为spec)。后一步依赖前一步的产出。禁止并行或乱序。"
      - "grill-with-docs exit → ddd-tenets exit → ddd-model exit → bdd-acceptance exit → 才可进入 implement"
    output: "设计文档 | .feature文件 | 领域模型标注 | 工具库检查清单"

  implement:
    on_enter: "TDD: 测试→失败→实现→通过。每步骤标记 [✓]。DDD 约束: 新建类型标注 Entity/VO/Aggregate。"
    tools_from_library:
      - tdd                    # trigger: 新功能/非琐碎 bugfix
      - gitnexus-impact        # MUST: 编辑任何符号前
      - prototype              # trigger: 数据模型不确定 or UI 多方案
      - ddd-tenets             # 实现时自检: Entity vs VO? 跨 Bounded Context?
    rules:
      - "gitnexus-impact: 编辑前 MUST。HIGH/CRITICAL → 暂停+汇报"
      - "tdd protocol: 每步 test→fail→impl→pass→refactor。禁止横切"
      - "完成每步: [✓ N/M]"
      - "DDD 与 TDD 分工: DDD 约束回答'这个类型是什么'(Entity/VO/Aggregate)——每类型标注一次；TDD 约束回答'这个功能对吗'(test→impl→refactor)——每步骤一次。DDD 不是 TDD 的替代，是 TDD 每步实现时的类型检查。禁止以 DDD 为理由跳过 TDD 步骤。"
      - "implement → review 回退上限: 3 次。第 3 次仍未通过 → 暂停+汇报根因，不等用户决策不继续。"
      - "scope creep 检测: 如果实际变更范围 ≥ origin_plan_scope × 2(文件数或模块数)，暂停并输出 [SCOPE CREEP] 警告。建议: 1) 回 plan 重新评估 bdd-acceptance 是否需要更新 spec; 2) 检查 ddd-model 是否需要更新领域模型。用户可 override 继续。"

  review:
    on_enter: "审查变更的正确性+副作用。回退计数器: implement_retries=0。"
    tools_from_library:
      - langgraph-cli-review         # per-file 即时审查
      - gitnexus-detect-changes      # MUST: 提交前
      - oh-my-claude-code-reviewer   # PR diff 级审查
      - oh-my-claude-validator       # 测试/lint 验证
      - langgraph-cli-pr             # PR 描述生成
      - bdd-evaluate                 # trigger: 有 .feature 文件 → 行为验收对照
    rules:
      - "P0 问题 → implement_retries += 1。if implement_retries > 3 → 暂停+汇报根因。else → 回 implement"
      - "gitnexus-detect-changes 超预期 → implement_retries += 1。if implement_retries > 3 → 暂停+汇报根因。else → 回 implement"
      - "bdd-evaluate 失败 → implement_retries += 1。if implement_retries > 3 → 暂停+汇报根因。else → 回 implement"
    exit: "review PASS AND detect_changes 范围正常 AND 无 P0 AND implement_retries ≤ 3"

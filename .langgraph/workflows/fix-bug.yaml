workflow:
  name: fix-bug
  entry: analyze_bug
  agents:
    - name: analyze_bug
      prompt: "分析bug，定位根因：\n{{ input.description }}"
      routes:
        - to: propose_fix
    - name: propose_fix
      prompt: "提出修复方案（含代码）：\n{{ analyze_bug }}"
      routes:
        - to: review_fix
    - name: review_fix
      prompt: "审查修复正确性和副作用：\n{{ propose_fix }}"
      routes:
        - to: $end

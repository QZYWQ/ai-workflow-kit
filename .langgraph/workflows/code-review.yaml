workflow:
  name: code-review
  entry: start
  agents:
    - name: start
      prompt: "分析代码结构：\n```\\n{{ input.code }}\\n```"
      parallel:
        - name: security_review
          prompt: "审查安全漏洞：\n```\\n{{ input.code }}\\n```"
        - name: quality_review
          prompt: "审查代码质量：\n```\\n{{ input.code }}\\n```"
      routes:
        - to: synthesize
    - name: synthesize
      prompt: "综合审查P0/P1/P2：\n安全:{{ security_review }}\n质量:{{ quality_review }}"
      routes:
        - to: $end
